<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程管理システム v1.00 | Distributed Architecture</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- 外部スタイルシート -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">工程管理システム v1.00</div>
        <div class="controls">
            <button class="btn btn-success" onclick="app.exportData()">データ出力</button>
            <div class="drop-hint">📥 JSONをドロップして読込</div>
            <div style="width:1px; height:24px; background:var(--border-color); margin:0 5px;"></div>
            <button class="btn btn-primary" onclick="app.print()">印刷</button>
            <button class="btn btn-primary" onclick="app.showAdminMng()">管理画面</button>
            <button class="btn btn-primary" onclick="app.showProjectMng()">製番リスト (別窓)</button>
            <button class="btn btn-danger" onclick="app.clearAllData()">データ全削除</button>
        </div>
    </header>

    <div class="tabs" id="teamTabs"></div>

    <main>
        <div class="app-main-layout">
            <div class="scheduler-card">
                <div class="week-nav">
                    <button class="btn" onclick="app.moveWeek(-1)">前週</button>
                    <div class="week-text" id="weekRange">...</div>
                    <button class="btn" onclick="app.moveWeek(1)">次週</button>
                </div>
                <div id="assignHint" class="assign-hint">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:1.2rem;">📍</span>
                        <span id="assignHintText">割り当てるセルを選択してください</span>
                    </div>
                    <button class="btn btn-sm" style="background:rgba(255,255,255,0.2); color:white; border:none;"
                        onclick="app.clearPendingPid()">キャンセル</button>
                </div>
                <div class="grid-container" id="grid"></div>
                <!-- 統計・集計エリア -->
                <div id="statsArea" class="stats-area"></div>
            </div>

            <!-- 詳細情報パネル -->
            <div id="detailPanel" class="detail-panel">
                <div class="detail-empty">
                    <div style="font-size:2rem; opacity:0.3; margin-bottom:1rem;">ℹ️</div>
                    工程バーをマウスオーバーすると<br>詳細情報が表示されます
                </div>
            </div>
        </div>
    </main>

    <!-- 製番リストビュー (モーダル兼用 v2.80) -->
    <div class="overlay" id="pjOverlay">
        <div class="pj-view modal-full" id="pjView">
            <div
                style="display:flex; justify-content:space-between; align-items:stretch; margin-bottom:1.5rem; gap:1.5rem;">
                <div>
                    <h2 style="color:var(--accent-color); font-size:1.5rem; margin:0; line-height:1.2;">製番・案件リスト管理</h2>
                    <div style="font-size:0.8rem; color:var(--text-secondary); margin-top:4px;">
                        個別選択や直接編集が可能です
                    </div>
                </div>

                <div class="paste-area" onclick="document.getElementById('pasteInp').focus()"
                    style="flex:1; margin:0; min-height:60px; display:flex; align-items:center; justify-content:center; padding:10px 15px;">
                    <div style="display:flex; align-items:baseline; gap:15px;">
                        <span style="font-size:1.1rem; font-weight:800; white-space:nowrap;">Excel表をここに貼り付け
                            (Ctrl+V)</span>
                        <span style="font-size:0.75rem; opacity:0.7; white-space:nowrap;">指令書No. / 客先 / 製品名 ...
                            の列形式</span>
                    </div>
                    <!-- テキストエリアの中身は見せないが機能させる -->
                    <textarea id="pasteInp" onpaste="app.handlePaste(event)"
                        style="opacity:0.01; position:absolute; width:1px; height:1px;"></textarea>
                </div>

                <div class="controls" style="display:flex; align-items:center; gap:8px;">
                    <button class="btn btn-primary" onclick="app.addBlankProject()">+手入力で追加</button>
                    <button class="btn" onclick="app.hidePjModal()">画面を閉じる</button>
                </div>
            </div>

            <!-- マルチフィルタ・コンソール (v2.41) -->
            <div class="pj-search-bar">
                <div class="filter-item">
                    <label>指令書No.</label>
                    <input type="text" placeholder="検索..." oninput="app.handlePjFilter('jobNo', this.value)">
                </div>
                <div class="filter-item">
                    <label>客先</label>
                    <input type="text" placeholder="検索..." oninput="app.handlePjFilter('customer', this.value)">
                </div>
                <div class="filter-item">
                    <label>製品名</label>
                    <input type="text" placeholder="検索..." oninput="app.handlePjFilter('name', this.value)">
                </div>
                <div class="filter-item">
                    <label>チーム</label>
                    <select id="fltTeam" onchange="app.handlePjFilter('team', this.value)"></select>
                </div>
                <div class="filter-item">
                    <label>担当者</label>
                    <select id="fltPerson" onchange="app.handlePjFilter('person', this.value)"></select>
                </div>
                <div class="filter-item">
                    <label>タグ</label>
                    <select id="fltTag" onchange="app.handlePjFilter('tagId', this.value)"></select>
                </div>
                <div class="filter-item"
                    style="flex:0; min-width:auto; display:flex; flex-direction:row; gap:8px; align-items:flex-end;">
                    <button class="btn btn-danger" onclick="app.resetPjFilters()"
                        style="padding:0.6rem 1rem; font-size:0.85rem;">リセット</button>
                    <button class="btn btn-primary" onclick="app.sortPjByTagMaster()"
                        style="padding:0.6rem 1rem; font-size:0.85rem;">タグ順に整列</button>
                </div>
                <div id="pjCount" class="pj-count">全 0 件</div>
            </div>

            <div class="table-container" id="projectBody"></div>
        </div>
    </div>

    <!-- 工程割り当てモーダル -->
    <div class="overlay" id="assignModal">
        <div class="modal modal-tight">
            <div style="margin-bottom:1.25rem; border-bottom:1px solid var(--border-color); padding-bottom:1rem;">
                <h3 id="targetStaff" style="font-size:1.2rem; color:var(--accent-color);">工程割り当て</h3>
            </div>

            <div class="m-tabs" style="margin-bottom:1.25rem;">
                <div class="m-tab active" id="atb-p" onclick="app.switchAssignTab('project')">製番の割当</div>
                <div class="m-tab" id="atb-s" onclick="app.switchAssignTab('special')">休暇・特別項目</div>
            </div>

            <div id="assign-p-sec" class="form-g">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:0.75rem;">
                    <label style="margin-bottom:0;">対象製番の選択</label>
                </div>
                <select id="pSel" style="height:46px;"></select>
            </div>

            <div id="assign-s-sec" class="form-g" style="display:none;">
                <label style="margin-bottom:0.75rem;">特別項目の入力 (休暇、出張など)</label>
                <input type="text" id="sTitle" placeholder="テキストを入力..." style="height:46px; margin-bottom:12px;">
                <div id="specialItemsContainer" style="display:flex; gap:8px; margin-bottom:1.5rem; flex-wrap:wrap;">
                    <!-- JSにて動的に生成されます -->
                </div>
            </div>

            <div
                style="background:rgba(255,255,255,0.03); padding:1.25rem; border-radius:12px; border:1px solid rgba(255,255,255,0.05);">
                <label style="margin-bottom:0.75rem;">2. 割り当て期間（曜日）</label>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div><label>開始曜日</label><select id="dayS">
                            <option value="0">月曜日</option>
                            <option value="1">火曜日</option>
                            <option value="2">水曜日</option>
                            <option value="3">木曜日</option>
                            <option value="4">金曜日</option>
                            <option value="5">土曜日</option>
                            <option value="6">日曜日</option>
                        </select></div>
                    <div><label>終了曜日</label><select id="dayE">
                            <option value="0">月曜日</option>
                            <option value="1">火曜日</option>
                            <option value="2">水曜日</option>
                            <option value="3">木曜日</option>
                            <option value="4">金曜日</option>
                            <option value="5">土曜日</option>
                            <option value="6">日曜日</option>
                        </select></div>
                </div>
            </div>

            <div class="m-footer" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:1.5rem;">
                <button class="btn btn-danger" id="delBtn" onclick="app.delSchedule()" style="width:100%;">解除</button>
                <button class="btn btn-success" id="compBtn" onclick="app.completeSchedule()"
                    style="width:100%;">完了(製番削除)</button>
                <button class="btn" onclick="app.hideModal('assignModal')" style="width:100%;">キャンセル</button>
                <button class="btn btn-primary" onclick="app.saveSchedule()" style="width:100%;">確定して保存</button>
            </div>
        </div>
    </div>

    <!-- メンバー管理モーダル -->
    <div class="overlay" id="memberModal">
        <div class="modal modal-lg">
            <h3>管理画面</h3>
            <div class="m-tabs">
                <div class="m-tab" id="mtb-s" onclick="app.switchMemberTab('staff')">メンバー設定</div>
                <div class="m-tab" id="mtb-t" onclick="app.switchMemberTab('team')">チーム設定</div>
                <div class="m-tab" id="mtb-tag" onclick="app.switchMemberTab('tag')">タグ設定</div>
                <div class="m-tab" id="mtb-si" onclick="app.switchMemberTab('specialItem')">特別項目</div>
                <div class="m-tab" id="mtb-del" onclick="app.switchMemberTab('deleted')">削除済み案件</div>
            </div>
            <div id="memberBody" style="overflow-y:auto; flex:1;"></div>
            <div class="m-footer">
                <button class="btn btn-primary" onclick="app.hideModal('memberModal')">閉じる</button>
            </div>
        </div>
    </div>

    <!-- ドラッグ＆ドロップ用オーバーレイ -->
    <div id="dropOverlay" class="drop-overlay">
        <div class="drop-message">
            <div style="font-size:4rem; margin-bottom:1rem;">📂</div>
            <div style="font-size:1.5rem; font-weight:800;">JSONファイルをドロップして読み込み</div>
            <div style="font-size:0.9rem; opacity:0.7; margin-top:0.5rem;">現在のデータは上書きされます</div>
        </div>
    </div>

    <!-- 外部スクリプト -->
    <script src="app.js"></script>
</body>

</html>
